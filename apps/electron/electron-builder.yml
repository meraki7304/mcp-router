appId: com.mcprouter.app
productName: MCP Router
copyright: Copyright © ${author}

# monorepo + pnpm hoist 下 builder 在 apps/electron/node_modules 找不到 electron 包，
# 显式声明版本避免 "Cannot compute electron version" 错误
electronVersion: 41.3.0

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/*.node"

# TODO: 加 afterPack hook 运行 @electron/fuses CLI（V1 + RunAsNode:false 等），
# 加 build/entitlements.mac.plist 用于 macOS 签名/notarize。
# 留到 make 阶段补，dev 不影响。

mac:
  category: public.app-category.developer-tools
  icon: public/images/icon/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # 不设 hardenedRuntime / identity / notarize：CI 上没 Apple 签名凭据，
  # 让 builder 走 unsigned 路径生成 dmg/zip。用户首次打开需在系统设置里允许。

dmg:
  # UDZO 是最通用兼容的 dmg 格式（macOS 10.6+ 全支持），ULFO 需要更新的 hdiutil 与更窄的兼容范围
  format: UDZO

win:
  icon: public/images/icon/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  shortcutName: MCP Router

linux:
  icon: public/images/icon/icon.png
  category: Development
  target:
    - AppImage
    - deb

publish:
  provider: github
  owner: meraki7304
  repo: mcp-router
  releaseType: draft
